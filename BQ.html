<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>DF1725IED Pre-FAT - Bill of Quantity</title>
    <link rel="stylesheet" href="style.css">
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.31/jspdf.plugin.autotable.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/qrcode-generator@1.4.4/qrcode.min.js"></script>
    <script src="https://unpkg.com/pdf-lib@1.16.0/dist/pdf-lib.min.js"></script>
    <script src="https://unpkg.com/downloadjs@1.4.7"></script>

    <style>
        .input-group {
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
            margin-bottom: 1.5rem;
        }
        .input-row {
            display: flex;
            flex-wrap: wrap;
            gap: 1rem;
            justify-content: space-between;
        }
        .input-row .form-group {
            flex: 1;
            min-width: 160px;
            display: flex;
            flex-direction: column;
        }
        .form-group label {
            margin-bottom: 0.5rem;
        }
        .checker-name-section, .vendor-number-section {
            margin-top: 1.5rem;
            padding: 1rem;
            border-top: 1px solid #ccc;
            background-color: #f9f9f9;
        }
        .checker-name-field, .vendor-number-field {
            max-width: 400px;
            margin: 0 auto;
        }
    </style>

    <script>
        // Set up jsPDF environment
        window.jsPDF = window.jspdf.jsPDF;
    </script>
</head>
<body>
    <img src="Icon/GV.png" alt="Logo" class="logo" id="logo" title="Go to Login Page" onerror="this.onerror=null; this.src='https://placehold.co/100x60/cccccc/ffffff?text=Logo'; this.alt='Logo Placeholder';" />

    <div id="bqPageContainer" class="page-container">
        <h1>Bill of Quantity</h1>
        <div class="control-panel">
            <div class="input-group">
                <div class="input-row">
                    <div class="form-group">
                        <label for="subrackCount">Subrack Quantity</label>
                        <input type="number" id="subrackCount" min="0" max="40" value="0" />
                    </div>              
                    <div class="form-group">
                        <label for="processorCount">Processor Quantity</label>
                        <input type="number" id="processorCount" min="0" max="40" value="0" />
                    </div>
                    <div class="form-group">
                        <label for="powerCount">Power Supply Quantity</label>
                        <input type="number" id="powerCount" min="0" max="40" value="0" />
                    </div>
                    <div class="form-group">
                        <label for="comCount">COM-6-A Quantity</label>
                        <input type="number" id="comCount" min="0" max="40" value="0" />
                    </div>      
                </div>
                <div class="input-row">
                    <div class="form-group">
                        <label for="diCount">Number of DI Modules</label>
                        <input type="number" id="diCount" min="0" max="40" value="0" />
                    </div>
                    <div class="form-group">
                        <label for="doCount">Number of DO Modules</label>
                        <input type="number" id="doCount" min="0" max="40" value="0" />
                    </div>
                    <div class="form-group">
                        <label for="aiCount">Number of AI Modules</label>
                        <input type="number" id="aiCount" min="0" max="40" value="0" />
                    </div>
                    <div class="form-group">
                        <label for="aoCount">Number of AO Modules</label>
                        <input type="number" id="aoCount" min="0" max="40" value="0" />
                    </div>
                </div>
            </div>
            <button id="generateBtn">Generate Sheets</button>
            <button id="clearBtn">Clear All</button>
        </div>
        
        <div id="sheetsContainer" class="sheet-container">
            </div>

        <div id="checkerNameSection" class="checker-name-section" style="display: none;">
            <div class="form-group checker-name-field">
                <label for="checkerName">Serial Number Checker's Name</label>
                <input type="text" id="checkerName" placeholder="Enter checker's name" />
            </div>
        </div>

        <div id="vendorNumberSection" class="vendor-number-section" style="display: none;">
            <div class="form-group vendor-number-field">
                <label for="vendorNumber">Vendor Number</label>
                <input type="text" id="vendorNumber" placeholder="Enter vendor number" />
            </div>
            <!-- Supplier Name Field -->
            <div class="form-group vendor-number-field" style="margin-top: 1rem;">
                <label for="supplierName">Supplier Name</label>
                <input type="text" id="supplierName" placeholder="Enter supplier name" />
            </div>
        </div>

        <div class="control-panel">
            <button id="backBtn">Back (A)</button>
            <button id="exportBtn" type="button">Export Configuration</button>
            <button id="submitBtn">Save & Continue (D)</button>
        </div>
    </div>

    <script src="BQ.js"></script>
    <script src="rtudetail.js"></script>
    <script src="generatePDF.js"></script>
    <!-- Removed googleDrive.js and bqDriveUpload.js references -->
    <script src="navigationGuard.js"></script>
    
    <canvas id="pdf-canvas" style="display: none;"></canvas>

    <script>
        function handleBackNavigation() {
            const btn = document.getElementById('backBtn');
            if (btn) btn.click();
        }

        function handleNextNavigation() {
            const btn = document.getElementById('submitBtn');
            if (btn) btn.click();
        }

        document.addEventListener('keydown', function(event) {
            const isInputField = event.target.tagName === 'INPUT' || event.target.tagName === 'TEXTAREA';
            if (!isInputField) {
                if (event.key.toLowerCase() === 'd') {
                    event.preventDefault();
                    handleNextNavigation();
                } else if (event.key.toLowerCase() === 'a') {
                    event.preventDefault();
                    handleBackNavigation();
                }
            }
        });

        // Prevention logic for double initialization
        window.addEventListener('load', () => {
            const exportBtn = document.getElementById('exportBtn');
            const submitBtn = document.getElementById('submitBtn');
            
            // Re-wrapping buttons ensures listeners from BQ.js are applied correctly once
            if (exportBtn) {
                const clone = exportBtn.cloneNode(true);
                exportBtn.parentNode.replaceChild(clone, exportBtn);
            }

            
            // Trigger script-level binding defined in BQ.js
            if (typeof bindEvents === 'function') bindEvents(); 
        });
    </script>
</body>
</html>
